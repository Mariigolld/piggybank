<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">🐷</div>
      <h1>PiggyBank</h1>
      <p>Create your account</p>
    </div>

    @if (error()) {
      <div class="auth-error">{{ error() }}</div>
    }

    <form (ngSubmit)="submit()" #f="ngForm">
      <div class="form-row">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" [(ngModel)]="firstName" name="firstName" placeholder="John" required />
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" [(ngModel)]="lastName" name="lastName" placeholder="Doe" required />
        </div>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="your@email.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="••••••••" required />
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" placeholder="••••••••" required />
      </div>
      <button type="submit" class="auth-btn" [disabled]="loading()">
        {{ loading() ? 'Creating account...' : 'Create Account' }}
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a routerLink="/login">Sign in</a>
    </div>
  </div>
</div>
